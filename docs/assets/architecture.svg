<svg xmlns="http://www.w3.org/2000/svg" width="820" height="730" viewBox="0 0 820 730" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="TriageLLM request flow: AI client to LiteLLM proxy to TierRouter to Ollama, with optional cloud escalation and a SQLite ledger.">
  <!-- Self-contained light card so the diagram reads on GitHub light AND dark themes -->
  <rect x="0" y="0" width="820" height="730" rx="14" fill="#ffffff" stroke="#d8dee4" stroke-width="1.5"/>

  <text x="410" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2933">TriageLLM request flow</text>
  <text x="410" y="63" text-anchor="middle" font-size="12.5" fill="#6b7785">local-first tier routing, cloud only as a last resort</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a96a3"/>
    </marker>
  </defs>

  <!-- 1. Client -->
  <rect x="120" y="84" width="360" height="64" rx="10" fill="#eef1f4" stroke="#c3ccd5" stroke-width="1.5"/>
  <text x="300" y="111" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2933">Your AI client</text>
  <text x="300" y="131" text-anchor="middle" font-size="11.5" fill="#56616c">curl &#183; Continue.dev &#183; aider &#183; Codex CLI &#183; Claude Code</text>

  <line x1="300" y1="148" x2="300" y2="184" stroke="#8a96a3" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="312" y="170" font-size="11" fill="#6b7785">OpenAI / Anthropic API</text>

  <!-- 2. LiteLLM proxy -->
  <rect x="120" y="186" width="360" height="62" rx="10" fill="#e7f0fb" stroke="#9cc1ea" stroke-width="1.5"/>
  <text x="300" y="212" text-anchor="middle" font-size="15" font-weight="700" fill="#13395e">LiteLLM proxy &#183; :4000</text>
  <text x="300" y="232" text-anchor="middle" font-size="11.5" fill="#3f6088">bound to 127.0.0.1 &#183; config.yaml</text>

  <line x1="300" y1="248" x2="300" y2="284" stroke="#8a96a3" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="312" y="270" font-size="11" fill="#6b7785">async_pre_call_hook</text>

  <!-- 3. TierRouter -->
  <rect x="120" y="286" width="360" height="132" rx="10" fill="#e3f4f1" stroke="#7fc7ba" stroke-width="1.5"/>
  <text x="300" y="311" text-anchor="middle" font-size="15" font-weight="700" fill="#0f5145">TierRouter &#183; router_hook.py</text>
  <text x="140" y="338" font-size="11.5" fill="#2f6b5f">&#8226; classify (rules + 0.5B LLM, escalate-only)</text>
  <text x="140" y="357" font-size="11.5" fill="#2f6b5f">&#8226; route to local-{s, m, l, xl}</text>
  <text x="140" y="376" font-size="11.5" fill="#2f6b5f">&#8226; critique answer (CPU-pinned 0.5B critic)</text>
  <text x="140" y="395" font-size="11.5" fill="#2f6b5f">&#8226; escalate / soft-pass / cloud / handoff</text>

  <!-- SQLite ledger (off to the side) -->
  <g>
    <ellipse cx="640" cy="300" rx="58" ry="13" fill="#f1ecf8" stroke="#b79fda" stroke-width="1.4"/>
    <path d="M582,300 v52 a58,13 0 0 0 116,0 v-52" fill="#f1ecf8" stroke="#b79fda" stroke-width="1.4"/>
    <ellipse cx="640" cy="300" rx="58" ry="13" fill="#f6f2fb" stroke="#b79fda" stroke-width="1.4"/>
    <text x="640" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#5b3f86">SQLite</text>
    <text x="640" y="349" text-anchor="middle" font-size="10" fill="#6f5398">decisions ledger</text>
  </g>
  <line x1="480" y1="352" x2="582" y2="345" stroke="#b79fda" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="498" y="342" font-size="10.5" fill="#7a5fa3">log</text>

  <line x1="300" y1="418" x2="300" y2="454" stroke="#8a96a3" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="312" y="440" font-size="11" fill="#6b7785">HTTP &#183; litellm.acompletion</text>

  <!-- 4. Ollama -->
  <rect x="120" y="456" width="360" height="78" rx="10" fill="#e8f5e1" stroke="#9bce86" stroke-width="1.5"/>
  <text x="300" y="481" text-anchor="middle" font-size="15" font-weight="700" fill="#2f5e1c">Ollama &#183; :11434</text>
  <text x="300" y="503" text-anchor="middle" font-size="11.5" fill="#446b30">GPU: worker model (S / M / L / XL)</text>
  <text x="300" y="521" text-anchor="middle" font-size="11.5" fill="#446b30">CPU: critic 0.5B (num_gpu=0, keep_alive=-1)</text>

  <!-- dashed arrow to optional cloud -->
  <line x1="300" y1="534" x2="300" y2="576" stroke="#d59b66" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="312" y="560" font-size="11" fill="#a9712f">last resort: XL failed + cloud enabled</text>

  <!-- 5. Optional cloud -->
  <rect x="120" y="578" width="360" height="80" rx="10" fill="#fbf2e7" stroke="#e0b483" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="300" y="604" text-anchor="middle" font-size="15" font-weight="700" fill="#8a5a1c">Optional cloud LLM &#183; via LiteLLM</text>
  <text x="300" y="625" text-anchor="middle" font-size="11.5" fill="#9a6f3c">anthropic / openai / gemini / mistral / ...</text>
  <text x="300" y="643" text-anchor="middle" font-size="11" fill="#a9824f">off by default &#183; needs cloud_escalation.enabled + API key</text>

  <text x="410" y="700" text-anchor="middle" font-size="11" fill="#8a96a3">Every request: classify &#8594; route to the smallest viable tier &#8594; critique &#8594; escalate only if the critic is unsatisfied.</text>
</svg>
